plugins {
    id "com.android.application"
}

android {
    namespace "com.smarthelmet.app"
    compileSdk 35

    ndkVersion "21.1.6352462"

    defaultConfig {
        applicationId "com.smarthelmet.app"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0"

        ndk {
            abiFilters 'arm64-v8a'
        }
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++11 -frtti -fexceptions -Wno-format"
                arguments '-DANDROID_PLATFORM=android-23', '-DANDROID_STL=c++_shared' ,"-DANDROID_ARM_NEON=TRUE"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.10.2"
        }
    }

    // THIS PREVENTS ANDROID FROM COMPRESSING YOUR TFLITE AND PADDLE MODELS
    aaptOptions {
        noCompress "tflite", "nb"
    }
}

// THIS LETS YOU USE TENSORFLOW LITE IN JAVA
dependencies {
    implementation 'org.tensorflow:tensorflow-lite:2.14.0'
    implementation 'org.tensorflow:tensorflow-lite-support:0.4.4'
    implementation 'com.google.mlkit:object-detection:17.0.2'
    implementation 'com.google.mlkit:face-detection:16.1.7'
}
